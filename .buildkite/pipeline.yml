steps:
  - group: "Card Onboarding Services"
    steps:
      - label: ":golang: Services - Run Linter"
        command: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          cd card-onboarding-services && golangci-lint run ./...
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":swagger: Services - Validate Swagger & Generate Check"
        command: |
          cd card-onboarding-services
          apk add --no-cache make git
          make swagger-validate && make generate-check
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":go: Services - Run Unit Tests & Check Coverage"
        command: |
          cd card-onboarding-services
          apk add --no-cache git grep sed
          go test -coverprofile=coverage.out github.com/org/card-onboarding-services/account-management-service/internal/account github.com/org/card-onboarding-services/customer-management-service/internal/customer github.com/org/card-onboarding-services/onboard-service/internal/orchestration
          SERVICES_COV=$$(go tool cover -func=coverage.out | awk '/total:/ {print $$3}' | sed 's/%//')
          echo "Services core logic coverage: $${SERVICES_COV}%"
          awk -v cov="$${SERVICES_COV}" 'BEGIN { if (cov < 70) { print "Error: Services coverage is below 70%"; exit 1 } }' || exit 1
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":docker: Services - Build Onboard Service Image"
        command: "cd card-onboarding-services && docker build -t onboard-service:latest -f onboard-service/Dockerfile ."

      - label: ":docker: Services - Build Customer Service Image"
        command: "cd card-onboarding-services && docker build -t customer-management-service:latest -f customer-management-service/Dockerfile ."

      - label: ":docker: Services - Build Account Service Image"
        command: "cd card-onboarding-services && docker build -t account-management-service:latest -f account-management-service/Dockerfile ."

  - group: "Card Onboarding Workers"
    steps:
      - label: ":golang: Workers - Run Linter"
        command: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          cd card-onboarding-workers && golangci-lint run ./...
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":go: Workers - Build Lambda Binaries"
        command: |
          cd card-onboarding-workers
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o card-onboarding-file-preprocessor/dist/bootstrap card-onboarding-file-preprocessor/main.go
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o card-onboarding-worker/dist/bootstrap card-onboarding-worker/main.go
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":aws-cdk: Workers - Validate CDK Synthesis"
        command: |
          export CDK_DEFAULT_ACCOUNT="123456789012"
          export CDK_DEFAULT_REGION="us-east-1"
          apk add --no-cache nodejs npm make git
          npm install -g aws-cdk
          cd card-onboarding-workers
          make infra-synth-all
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"

      - label: ":go: Workers - Run Unit Tests & Check Coverage"
        command: |
          cd card-onboarding-workers
          apk add --no-cache git grep sed
          
          echo "=== Testing card-onboarding-file-preprocessor ==="
          cd card-onboarding-file-preprocessor
          go test -coverprofile=coverage.out $$(go list ./... | grep -v -E '/cmd/|/infra|/s3|/sqs|/config|smoke-test')
          PREPROCESSOR_COV=$$(go tool cover -func=coverage.out | awk '/total:/ {print $$3}' | sed 's/%//')
          echo "Preprocessor coverage: $${PREPROCESSOR_COV}%"
          awk -v cov="$${PREPROCESSOR_COV}" 'BEGIN { if (cov < 70) { print "Error: Preprocessor coverage is below 70%"; exit 1 } }' || exit 1
          
          echo "=== Testing card-onboarding-worker ==="
          cd ../card-onboarding-worker
          go test -coverprofile=coverage.out $$(go list ./... | grep -v -E '/cmd/|/infra|/client|/config|smoke-test')
          WORKER_COV=$$(go tool cover -func=coverage.out | awk '/total:/ {print $$3}' | sed 's/%//')
          echo "Worker coverage: $${WORKER_COV}%"
          awk -v cov="$${WORKER_COV}" 'BEGIN { if (cov < 70) { print "Error: Worker coverage is below 70%"; exit 1 } }' || exit 1
        plugins:
          - docker#v5.11.0:
              image: "golang:1.26-alpine"
